<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منظومة الوكلاء الذكية — القصواء للتطوير العقاري</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:       #1A3152;
      --navy-dark:  #0F1E33;
      --navy-mid:   #234072;
      --gold:       #C9A84C;
      --gold-light: #E8C97A;
      --gold-dim:   rgba(201,168,76,0.15);
      --bg:         #ECF0F6;
      --card-bg:    #FFFFFF;
      --card-border:#D8E0EC;
      --text-h:     #111E30;
      --text-b:     #4A6080;
      --text-muted: #8099B8;
      --radius:     14px;
      --shadow:     0 2px 12px rgba(26,49,82,0.09);
      --shadow-act: 0 6px 28px rgba(201,168,76,0.38), 0 0 0 2px var(--gold);
      --ease:       cubic-bezier(0.4,0,0.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100vh;
      overflow: hidden;
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text-h);
    }

    /* ── شاشة البداية ───────────────────────────────── */
    #startScreen {
      position: fixed; inset: 0; z-index: 200;
      background: linear-gradient(160deg, var(--navy-dark) 0%, var(--navy) 55%, #1e4070 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
      transition: opacity 0.5s ease;
    }
    #startScreen.fade-out { opacity: 0; pointer-events: none; }
    #startScreen.hidden   { display: none; }

    .start-logo    { font-size: 3.4rem; filter: drop-shadow(0 4px 14px rgba(0,0,0,0.4)); }
    .start-title   { color: #fff; font-size: 1.8rem; font-weight: 800; text-align: center; }
    .start-divider { width: 56px; height: 3px; background: var(--gold); border-radius: 2px; }
    .start-sub     { color: var(--gold-light); font-size: 0.92rem; text-align: center; line-height: 1.75; max-width: 360px; }
    .start-btn {
      margin-top: 6px; padding: 14px 48px;
      background: var(--gold); color: #fff;
      font-family: 'Tajawal', sans-serif; font-size: 1.05rem; font-weight: 700;
      border: none; border-radius: 50px; cursor: pointer;
      box-shadow: 0 6px 28px rgba(201,168,76,0.55);
      transition: background 0.25s, transform 0.25s, box-shadow 0.25s;
    }
    .start-btn:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 10px 36px rgba(201,168,76,0.65); }

    /* ── الهيدر ─────────────────────────────────────── */
    #appHeader {
      background: var(--navy); height: 56px;
      display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.28); flex-shrink: 0;
    }
    .brand { display: flex; align-items: center; gap: 11px; }
    .brand-logo {
      width: 32px; height: 32px; border-radius: 7px;
      background: var(--gold); display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 800; color: #fff; flex-shrink: 0;
    }
    .brand-name { color: #fff; font-size: 0.95rem; font-weight: 700; line-height: 1.2; }
    .brand-sub  { color: var(--gold); font-size: 0.68rem; }

    .status-capsule {
      display: flex; align-items: center; gap: 12px;
      background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50px; padding: 6px 16px;
    }
    #activeAgentName { color: #fff; font-size: 0.86rem; font-weight: 600; min-width: 90px; text-align: center; }
    .status-pill  { display: flex; align-items: center; gap: 6px; font-size: 0.73rem; color: rgba(255,255,255,0.65); }
    .s-dot        { width: 8px; height: 8px; border-radius: 50%; background: #445; transition: background 0.3s; }
    .s-dot.idle         { background: #445; }
    .s-dot.connecting   { background: #42A5F5; animation: blink 0.9s infinite; }
    .s-dot.listening    { background: #4CAF50; animation: pulse-g 1.6s infinite; }
    .s-dot.speaking     { background: var(--gold); animation: pulse-d 1.4s infinite; }
    .s-dot.transferring { background: #42A5F5; animation: pulse-b 0.7s infinite; }

    /* ── المحتوى الرئيسي ────────────────────────────── */
    #appMain {
      height: calc(100vh - 56px);
      display: flex; flex-direction: column;
      padding: 14px 18px 12px; gap: 11px; overflow: hidden;
    }

    /* ── شبكة الوكلاء 4×2 ───────────────────────────── */
    #agentsGrid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 11px; flex: 1; min-height: 0;
    }

    .agent-card {
      background: var(--card-bg); border: 2px solid var(--card-border);
      border-radius: var(--radius); padding: 12px 10px 10px;
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      text-align: center; position: relative; overflow: hidden;
      cursor: pointer; user-select: none;
      transition: opacity 0.35s var(--ease), border-color 0.35s var(--ease),
                  transform 0.35s var(--ease), box-shadow 0.35s var(--ease);
      opacity: 0.3; box-shadow: var(--shadow);
    }
    .agent-card::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--gold); transform: scaleX(0); transform-origin: right;
      transition: transform 0.35s var(--ease);
    }

    .agent-card.available             { opacity: 0.55; }
    .agent-card.available:hover       { opacity: 0.85; border-color: var(--gold-light); transform: translateY(-2px); box-shadow: 0 6px 18px rgba(201,168,76,0.22); }
    .agent-card.active                { opacity: 1; border-color: var(--gold); box-shadow: var(--shadow-act); transform: scale(1.02) translateY(-1px); }
    .agent-card.active::after         { transform: scaleX(1); }
    .agent-card.pending               { opacity: 0.25; cursor: not-allowed; }
    .agent-card.pending:hover         { opacity: 0.25; transform: none; border-color: var(--card-border); box-shadow: var(--shadow); }
    .agent-card.leaving               { animation: card-out 0.4s var(--ease) forwards; }
    .agent-card.entering              { animation: card-in  0.4s var(--ease) forwards; }

    .card-icon    { font-size: 1.75rem; line-height: 1; }
    .card-name    { font-size: 0.86rem; font-weight: 700; color: var(--text-h); line-height: 1.2; }
    .card-role    { font-size: 0.66rem; color: var(--text-b); line-height: 1.3; }
    .card-desc    { font-size: 0.62rem; color: var(--text-muted); line-height: 1.35; margin-top: 1px; }
    .card-pending {
      position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
      font-size: 0.54rem; color: var(--text-muted); white-space: nowrap;
      background: var(--bg); border-radius: 4px; padding: 1px 5px;
    }

    /* ── شريط التحكم ────────────────────────────────── */
    #controlsBar {
      display: flex; align-items: center; gap: 10px;
      background: var(--card-bg); border-radius: var(--radius);
      padding: 9px 14px; box-shadow: var(--shadow); flex-shrink: 0;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 18px; border: none; border-radius: 50px;
      font-family: 'Tajawal', sans-serif; font-size: 0.83rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s, transform 0.2s; white-space: nowrap;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
    .btn-navy  { background: var(--navy);  color: #fff; }
    .btn-navy:not(:disabled):hover  { background: var(--navy-mid); transform: translateY(-1px); }
    .btn-danger { background: #DC3545; color: #fff; }
    .btn-danger:not(:disabled):hover { background: #c82333; transform: translateY(-1px); }
    .btn-mic {
      width: 40px; height: 40px; padding: 0; border-radius: 50%;
      font-size: 1.05rem; background: #F0F4FA; border: 2px solid var(--card-border);
      cursor: pointer; transition: border-color 0.2s, background 0.2s;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      margin-inline-end: auto;
    }
    .btn-mic:hover  { border-color: var(--gold); }
    .btn-mic.muted  { background: #FFF0F0; border-color: #DC3545; }

    /* ── الـ Transcript ──────────────────────────────── */
    #transcriptPanel {
      background: var(--card-bg); border-radius: var(--radius);
      padding: 9px 14px; max-height: 110px; min-height: 54px;
      overflow-y: auto; box-shadow: var(--shadow); flex-shrink: 0;
      display: flex; flex-direction: column; gap: 4px; scroll-behavior: smooth;
    }
    #transcriptPanel:empty::before {
      content: 'سيظهر هنا نص الحوار حين يبدأ...';
      color: var(--text-muted); font-size: 0.78rem;
    }
    .tr-row    { display: flex; gap: 8px; font-size: 0.77rem; line-height: 1.5; animation: fadeup 0.22s ease; }
    .tr-who    { font-weight: 700; flex-shrink: 0; min-width: 72px; }
    .tr-who.user   { color: var(--navy); }
    .tr-who.agent  { color: var(--gold); }
    .tr-who.system { color: var(--text-muted); font-style: italic; }
    .tr-text         { color: var(--text-h); }
    .tr-text.system  { color: var(--text-muted); font-style: italic; }

    /* ── overlay التحويل ─────────────────────────────── */
    #transferOverlay {
      position: fixed; inset: 0; z-index: 150;
      background: rgba(15,30,51,0.82); backdrop-filter: blur(6px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    #transferOverlay.show { opacity: 1; pointer-events: all; }
    .transfer-box  { text-align: center; animation: float 2s ease-in-out infinite; }
    .transfer-spin { font-size: 3rem; display: inline-block; margin-bottom: 16px; animation: spin 2s linear infinite; }
    .transfer-title { color: #fff; font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
    .transfer-sub   { color: var(--gold-light); font-size: 0.88rem; }

    /* ── بانر الخطأ ──────────────────────────────────── */
    #errorBanner {
      position: fixed; top: 56px; left: 0; right: 0; z-index: 130;
      background: #DC3545; color: #fff; text-align: center;
      padding: 8px 16px; font-size: 0.83rem; font-weight: 600;
      display: none; align-items: center; justify-content: center; gap: 12px;
    }
    #errorBanner.show { display: flex; }
    #errorBanner button {
      background: #fff; color: #DC3545; border: none; border-radius: 20px;
      padding: 3px 14px; font-family: 'Tajawal', sans-serif; font-weight: 700;
      font-size: 0.8rem; cursor: pointer;
    }

    /* ── Toast ───────────────────────────────────────── */
    #toast {
      position: fixed; top: 70px; left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: var(--navy); color: #fff;
      padding: 7px 20px; border-radius: 50px; font-size: 0.8rem; font-weight: 500;
      z-index: 180; opacity: 0; pointer-events: none; white-space: nowrap;
      transition: opacity 0.22s, transform 0.22s;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Keyframes ───────────────────────────────────── */
    @keyframes blink    { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes pulse-g  { 0%,100%{box-shadow:0 0 0 0 rgba(76,175,80,0.5)}  50%{box-shadow:0 0 0 5px rgba(76,175,80,0)} }
    @keyframes pulse-d  { 0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,0.5)} 50%{box-shadow:0 0 0 5px rgba(201,168,76,0)} }
    @keyframes pulse-b  { 0%,100%{box-shadow:0 0 0 0 rgba(66,165,245,0.6)} 50%{box-shadow:0 0 0 5px rgba(66,165,245,0)} }
    @keyframes card-out { 0%{transform:scale(1.02);opacity:1} 100%{transform:scale(0.96);opacity:0.25} }
    @keyframes card-in  { 0%{transform:scale(0.9);opacity:0.25} 100%{transform:scale(1.02);opacity:1} }
    @keyframes spin     { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes float    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes fadeup   { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

    ::-webkit-scrollbar       { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 2px; }
  </style>
</head>
<body>

  <!-- شاشة البداية -->
  <div id="startScreen">
    <div class="start-logo">🏢</div>
    <div class="start-title">منظومة الوكلاء الذكية</div>
    <div class="start-divider"></div>
    <div class="start-sub">القصواء للتطوير العقاري<br>ثمانية وكلاء متخصصون، خبرة واحدة متكاملة</div>
    <button class="start-btn" onclick="startPresentation()">ابدأ التعريف</button>
  </div>

  <!-- بانر الخطأ -->
  <div id="errorBanner">
    <span>⚠️ انقطع الاتصال بالخادم</span>
    <button onclick="retryConnection()">إعادة المحاولة</button>
  </div>

  <!-- الهيدر -->
  <header id="appHeader">
    <div class="brand">
      <div class="brand-logo">ق</div>
      <div>
        <div class="brand-name">منظومة الوكلاء الذكية</div>
        <div class="brand-sub">القصواء للتطوير العقاري</div>
      </div>
    </div>
    <div class="status-capsule">
      <div id="activeAgentName">—</div>
      <div class="status-pill">
        <div class="s-dot idle" id="sDot"></div>
        <span id="sLabel">صامت</span>
      </div>
    </div>
  </header>

  <!-- المحتوى -->
  <main id="appMain">
    <div id="agentsGrid"></div>
    <div id="controlsBar">
      <button class="btn-mic" id="micBtn" onclick="toggleMic()" title="كتم / تشغيل صوت الوكيل">🔊</button>
      <button class="btn btn-navy"   id="returnBtn" onclick="returnToFahim()"   disabled>↩ العودة لفهيم</button>
      <button class="btn btn-danger" id="endBtn"    onclick="endConversation()" disabled>✕ إنهاء الحوار</button>
    </div>
    <div id="transcriptPanel"></div>
  </main>

  <!-- overlay التحويل -->
  <div id="transferOverlay">
    <div class="transfer-box">
      <div class="transfer-spin">⚡</div>
      <div class="transfer-title" id="transferTitle">جاري التحويل...</div>
      <div class="transfer-sub"   id="transferSub"></div>
    </div>
  </div>

  <div id="toast"></div>

  <!-- ElevenLabs SDK -->
  <script src="https://unpkg.com/@11labs/client@0.2.0/dist/lib.umd.js"></script>

  <script>
'use strict';

/* ══════════════════════════════════════════════════════════
   بيانات الوكلاء — كل شيء في مكان واحد
   ══════════════════════════════════════════════════════════ */
const AGENTS = {
  fahim:      { name: 'فهيم',                     role: 'المنسّق الرئيسي',      icon: '🧠', desc: 'منسّق استشاري — يحوّلك للمستشار المناسب', id: 'agent_0401krb9yspvff1rymvs0jetr7xr' },
  network:    { name: 'مسؤول الشبكات',            role: 'Network Engineer',      icon: '🌐', desc: 'مستشار البنية التحتية للاتصالات',           id: 'agent_6701kqymma5zfw1ac38ey6jm32xs' },
  systems:    { name: 'مسؤول الأنظمة',            role: 'Systems Administrator', icon: '🖥️', desc: 'مستشار الخوادم والنسخ الاحتياطي',           id: 'agent_9901krhkwj43frms4dqps4p1ypmz' },
  apps:       { name: 'مسؤول التطبيقات',          role: 'Application Manager',   icon: '💼', desc: 'مستشار التطبيقات المؤسسية',                 id: 'agent_7901krhkyahhe9wrjsc303dd0a0k' },
  bim:        { name: 'مسؤول الـ BIM',             role: 'BIM Manager',           icon: '🏗️', desc: 'مستشار نمذجة معلومات البناء',               id: 'agent_3101krhm17pafzyrmtnf92tdhkdj' },
  trainer:    { name: 'المدرّب التقني',            role: 'Tech Trainer',          icon: '📚', desc: 'مستشار التدريب والتطوير المهني',             id: 'agent_5901krhm2a7jfmzsh522sxvtt7as' },
  robotics:   { name: 'وكيل الروبوتات',           role: 'Construction Robotics', icon: '🚁', desc: 'مستشار التقنيات الميدانية الذكية',           id: 'agent_7501krhm4g7kfsavd3azxpj1h627' },
  smarthomes: { name: 'وكيل البيوت الذكية',       role: 'Smart Homes Engineer',  icon: '🏠', desc: 'مستشار أنظمة الأتمتة',                      id: 'agent_1501krhm6751ee9ayvpt5zdwc7bs' },
};

const ORDER = ['fahim', 'network', 'systems', 'apps', 'bim', 'trainer', 'robotics', 'smarthomes'];

/* خريطة اسم الوكيل كما يذكره الوكيل في ردّه → مفتاح AGENTS */
const TRANSFER_MAP = {
  'فهيم':                   'fahim',
  'المنسّق':                'fahim',
  'مسؤول الشبكات':          'network',
  'مسؤولة الشبكات':         'network',
  'مسؤول الأنظمة':          'systems',
  'مسؤولة الأنظمة':         'systems',
  'مسؤولة التطبيقات':       'apps',
  'مسؤول التطبيقات':        'apps',
  'مسؤول الـ BIM':            'bim',
  'مسؤول BIM':                'bim',
  'مسؤول الـ بِي آي إم':     'bim',
  'مسؤول بِي آي إم':          'bim',
  'مسؤول الـ بي آي إم':      'bim',
  'مسؤول بي آي إم':           'bim',
  'مسؤول البيم':              'bim',
  'مدير الـ BIM':             'bim',
  'المدرّب التقني':          'trainer',
  'المدرّبة التقنية':        'trainer',
  'المدربة التقنية':         'trainer',
  'وكيل الروبوتات':          'robotics',
  'وكيلة الروبوتات':         'robotics',
  'وكيلة البيوت الذكية':     'smarthomes',
  'وكيل البيوت الذكية':      'smarthomes',
};

/* عبارات التحويل — موسّعة لتغطية كل صياغات الوكلاء */
const TRIGGERS = [
  'اسمح لي أحوّلك لـ',
  'اسمح لي احوّلك لـ',
  'اسمح لي أحولك لـ',
  'اسمح لي احولك لـ',
  'اسمح لي أحوّلك ل',
  'اسمح لي احوّلك ل',
  'اسمح لي أحوّلك إلى',
  'اسمح لي احوّلك إلى',
  'اسمح لي بتحويلك إلى',
  'اسمح لي بتحويلك لـ',
  'اسمح لي بتحويلك ل',
  'سأحوّلك لـ',
  'سأحوّلك ل',
  'سأحوّلك إلى',
  'سأحولك لـ',
  'سأحولك إلى',
  'سأنقلك إلى',
  'سأنقلك لـ',
  'دعني أحوّلك لـ',
  'دعني أحوّلك إلى',
  'دعني أحولك لـ',
  'أحوّلك الآن لـ',
  'أحوّلك الآن إلى',
  'سأقوم بتحويلك إلى',
  'سأقوم بتحويلك لـ',
];

/* ══════════════════════════════════════════════════════════
   حالة التطبيق — كائن واحد
   ══════════════════════════════════════════════════════════ */
const state = {
  activeKey:       null,
  conv:            null,
  muted:           false,
  transferring:    false,
  started:         false,
  lastUserMsg:     '',
  pendingTransfer: null,  // ينتظر انتهاء كلام الوكيل قبل التنفيذ
};

/* ══════════════════════════════════════════════════════════
   أدوات مساعدة
   ══════════════════════════════════════════════════════════ */
const sleep   = ms => new Promise(r => setTimeout(r, ms));
const hasId   = key => { const id = AGENTS[key]?.id; return !!(id && id.length > 8); };
const escHtml = s => String(s).replace(/[&<>"']/g, c =>
  ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
const getSDK  = () => window.client?.Conversation ?? null;

/* ══════════════════════════════════════════════════════════
   بناء الشبكة
   ══════════════════════════════════════════════════════════ */
function buildGrid() {
  document.getElementById('agentsGrid').innerHTML = ORDER.map(key => {
    const a = AGENTS[key];
    const pending = !hasId(key);
    return `
      <div class="agent-card${pending ? ' pending' : ''}" id="card-${key}" onclick="onCardClick('${key}')">
        <div class="card-icon">${a.icon}</div>
        <div class="card-name">${a.name}</div>
        <div class="card-role">${a.role}</div>
        <div class="card-desc">${a.desc}</div>
        ${pending ? '<div class="card-pending">قيد الإعداد</div>' : ''}
      </div>`;
  }).join('');
}

/* ══════════════════════════════════════════════════════════
   إدارة البطاقات
   ══════════════════════════════════════════════════════════ */
function setActiveCard(key, animate = false) {
  const prevKey = state.activeKey;
  ORDER.forEach(k => {
    const card = document.getElementById(`card-${k}`);
    if (!card) return;
    card.classList.remove('active', 'available', 'leaving', 'entering');
    if (!key) return;
    if (k === key) {
      if (animate) {
        card.classList.add('entering');
        card.addEventListener('animationend', () => {
          card.classList.remove('entering');
          card.classList.add('active');
        }, { once: true });
      } else {
        card.classList.add('active');
      }
    } else if (!hasId(k)) {
      card.classList.add('pending');
    } else if (animate && k === prevKey) {
      card.classList.add('leaving');
      card.addEventListener('animationend', () => {
        card.classList.remove('leaving');
        card.classList.add('available');
      }, { once: true });
    } else {
      card.classList.add('available');
    }
  });
  state.activeKey = key;
  document.getElementById('activeAgentName').textContent = key ? AGENTS[key].name : '—';
}

function clearCards() {
  ORDER.forEach(k => {
    const card = document.getElementById(`card-${k}`);
    if (!card) return;
    card.classList.remove('active', 'available', 'leaving', 'entering');
    if (!hasId(k)) card.classList.add('pending');
  });
  state.activeKey = null;
  document.getElementById('activeAgentName').textContent = '—';
}

/* ══════════════════════════════════════════════════════════
   شريط الحالة
   ══════════════════════════════════════════════════════════ */
const STATUS_LABELS = {
  idle: 'صامت', connecting: 'جاري الاتصال…',
  listening: 'يستمع', speaking: 'يتكلّم', transferring: 'جاري التحويل',
};
function setStatus(s) {
  document.getElementById('sDot').className = `s-dot ${s}`;
  document.getElementById('sLabel').textContent = STATUS_LABELS[s] ?? s;
}

/* ══════════════════════════════════════════════════════════
   الـ Transcript
   ══════════════════════════════════════════════════════════ */
function addTranscript(role, text) {
  const agentName = state.activeKey ? AGENTS[state.activeKey]?.name : 'الوكيل';
  const labels = { user: 'أنت', agent: agentName, system: 'النظام' };
  const panel = document.getElementById('transcriptPanel');
  const row = document.createElement('div');
  row.className = 'tr-row';
  row.innerHTML = `
    <span class="tr-who ${role}">${labels[role] ?? role}:</span>
    <span class="tr-text ${role === 'system' ? 'system' : ''}">${escHtml(text)}</span>`;
  panel.appendChild(row);
  panel.scrollTop = panel.scrollHeight;
  if (role === 'user') state.lastUserMsg = text;
}

/* ══════════════════════════════════════════════════════════
   كشف نية التحويل — بحث نصي مباشر
   ══════════════════════════════════════════════════════════ */
function detectTransfer(text) {
  if (state.transferring) return null;

  let afterTrigger = null;
  for (const trigger of TRIGGERS) {
    const idx = text.indexOf(trigger);
    if (idx !== -1) {
      afterTrigger = text.slice(idx + trigger.length).trim();
      break;
    }
  }
  if (!afterTrigger) return null;

  for (const [name, key] of Object.entries(TRANSFER_MAP)) {
    if (afterTrigger.startsWith(name) || afterTrigger.includes(name)) {
      if (key !== state.activeKey && hasId(key)) {
        console.log(`[Transfer] ✅ "${name}" → ${key}`);
        return key;
      }
    }
  }
  return null;
}

/* ══════════════════════════════════════════════════════════
   إدارة الجلسة
   ══════════════════════════════════════════════════════════ */
async function endCurrentSession(silent = false) {
  state.pendingTransfer = null;
  clearTimeout(_errorTimer);
  hideError();
  if (state.conv) {
    try { await state.conv.endSession(); } catch (_) { /* تجاهل */ }
    state.conv = null;
  }
  if (!silent) setStatus('idle');
}

async function startSession(key, firstMsgOverride = null) {
  const SDK = getSDK();
  if (!SDK) {
    addTranscript('system', '❌ ElevenLabs SDK غير محمّل — تحقق من الاتصال بالإنترنت وأعد تحميل الصفحة');
    showToast('❌ SDK غير محمّل');
    return;
  }

  if (!hasId(key)) {
    addTranscript('system', `⏳ ${AGENTS[key].name} قيد الإعداد — أضف Agent ID لتفعيله`);
    return;
  }

  setStatus('connecting');
  console.log(`[Session] ▶ ${key} | ${AGENTS[key].id}`);

  try {
    const opts = {
      agentId: AGENTS[key].id,

      onConnect: ({ conversationId }) => {
        console.log(`[Session] ✅ ${key} | conv: ${conversationId}`);
        setStatus('listening');
        hideError();
      },

      onDisconnect: details => {
        console.log(`[Session] ⛔ ${key}`, details);
        if (!state.transferring) {
          setStatus('idle');
          const reason = details?.reason ?? details?.code ?? '';
          const isNormal = ['user_ended','agent_ended','normal',1000,''].includes(reason);
          if (!isNormal) {
            addTranscript('system', `⚠️ انقطع الاتصال بـ ${AGENTS[key].name}`);
            scheduleError();
          }
        }
      },

      onError: (msg, ctx) => {
        console.error(`[Session] ❌ ${key}: "${msg}"`, ctx);
        if (!state.transferring) {
          addTranscript('system', `❌ خطأ في ${AGENTS[key].name}: ${msg || 'تحقق من Console'}`);
          showError();
        }
      },

      onMessage: ({ message, source }) => {
        if (source === 'ai') {
          addTranscript('agent', message);
          console.log(`[Msg:${key}] "${message}"`);
          const target = detectTransfer(message);
          if (target) {
            console.log(`[Session] ⏳ تحويل معلّق إلى ${target} — ينتظر انتهاء الكلام`);
            state.pendingTransfer = target;
          }
        } else if (source === 'user') {
          addTranscript('user', message);
        }
      },

      onModeChange: ({ mode }) => {
        if (!state.transferring) {
          setStatus(mode === 'speaking' ? 'speaking' : 'listening');
          if (mode !== 'speaking' && state.pendingTransfer) {
            const target = state.pendingTransfer;
            state.pendingTransfer = null;
            console.log(`[Session] 🔄 تنفيذ التحويل إلى ${target} (انتهى الكلام)`);
            setTimeout(() => executeTransfer(target), 400);
          }
        }
      },
    };

    if (firstMsgOverride) {
      opts.overrides = { agent: { firstMessage: firstMsgOverride } };
      console.log(`[Session] 💬 firstMessage: "${firstMsgOverride}"`);
    }

    state.conv = await SDK.startSession(opts);

    if (state.muted && state.conv?.setVolume) {
      state.conv.setVolume({ volume: 0 });
    }
    console.log(`[Session] 🎤 نشط: ${key}`);

  } catch (err) {
    console.error(`[Session] ❌ فشل [${key}]:`, err);
    const msg = err?.message ?? '';
    if (err?.name === 'NotAllowedError' || msg.includes('getUserMedia')) {
      addTranscript('system', '❌ لا يوجد إذن للميكروفون — اضغط أيقونة القفل في شريط العنوان وأذن للميكروفون');
      showToast('❌ يحتاج إذن الميكروفون');
    } else {
      addTranscript('system', `❌ فشل الاتصال بـ ${AGENTS[key].name}: ${msg || err?.name || 'تحقق من Console (F12)'}`);
      showError();
    }
  }
}

/* ══════════════════════════════════════════════════════════
   تنفيذ التحويل
   ══════════════════════════════════════════════════════════ */
async function executeTransfer(targetKey) {
  if (state.transferring || targetKey === state.activeKey) return;
  if (!hasId(targetKey)) {
    showToast(`⏳ ${AGENTS[targetKey].name} قيد الإعداد`);
    return;
  }

  state.transferring = true;
  const srcKey = state.activeKey;
  const meta   = AGENTS[targetKey];

  console.log(`[Transfer] ⚡ ${srcKey} → ${targetKey}`);
  setStatus('transferring');

  document.getElementById('transferTitle').textContent = `جاري التحويل إلى ${meta.name}`;
  document.getElementById('transferSub').textContent   = meta.role;
  document.getElementById('transferOverlay').classList.add('show');
  addTranscript('system', `⚡ التحويل إلى ${meta.name}...`);

  await sleep(600);
  await endCurrentSession(true);
  setActiveCard(targetKey, true);
  await sleep(500);

  document.getElementById('transferOverlay').classList.remove('show');
  state.transferring = false;

  await startSession(targetKey);  // بدون override — يبدأ بـ First Message الافتراضي
}

/* ══════════════════════════════════════════════════════════
   أزرار التحكم
   ══════════════════════════════════════════════════════════ */
async function startPresentation() {
  if (state.started) return;
  state.started = true;

  const screen = document.getElementById('startScreen');
  screen.classList.add('fade-out');
  setTimeout(() => screen.classList.add('hidden'), 500);

  document.getElementById('returnBtn').disabled = false;
  document.getElementById('endBtn').disabled    = false;

  setActiveCard('fahim');
  await startSession('fahim');
}

async function returnToFahim() {
  if (!state.started || state.activeKey === 'fahim' || state.transferring) return;
  addTranscript('system', 'العودة إلى فهيم...');
  await executeTransfer('fahim');
}

async function endConversation() {
  if (!state.started) return;
  await endCurrentSession();
  clearCards();
  setStatus('idle');
  document.getElementById('returnBtn').disabled = true;
  document.getElementById('endBtn').disabled    = true;
  document.getElementById('transcriptPanel').innerHTML = '';
  state.started    = false;
  state.lastUserMsg = '';
  showToast('تم إنهاء الحوار');
}

function onCardClick(key) {
  if (!state.started || state.transferring || key === state.activeKey) return;
  if (!hasId(key)) { showToast(`⏳ ${AGENTS[key].name} قيد الإعداد`); return; }
  executeTransfer(key);
}

function toggleMic() {
  state.muted = !state.muted;
  const btn = document.getElementById('micBtn');
  if (state.muted) {
    btn.textContent = '🔇';
    btn.classList.add('muted');
    if (state.conv?.setVolume) state.conv.setVolume({ volume: 0 });
    showToast('🔇 صوت الوكيل مكتوم');
  } else {
    btn.textContent = '🔊';
    btn.classList.remove('muted');
    if (state.conv?.setVolume) state.conv.setVolume({ volume: 1 });
    showToast('🔊 صوت الوكيل مفعّل');
  }
}

/* ══════════════════════════════════════════════════════════
   الأخطاء — مع تأخير 3 ث لتجنّب الانقطاعات اللحظية
   ══════════════════════════════════════════════════════════ */
let _errorTimer = null;

function scheduleError() {
  clearTimeout(_errorTimer);
  _errorTimer = setTimeout(() => {
    if (!state.conv && state.started) showError();
  }, 3000);
}

function showError() { if (state.started) document.getElementById('errorBanner').classList.add('show'); }
function hideError()  { document.getElementById('errorBanner').classList.remove('show'); }

function retryConnection() {
  hideError();
  clearTimeout(_errorTimer);
  if (state.activeKey && hasId(state.activeKey)) {
    showToast('جاري إعادة الاتصال…');
    startSession(state.activeKey);
  }
}

/* ══════════════════════════════════════════════════════════
   Toast
   ══════════════════════════════════════════════════════════ */
let _toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ══════════════════════════════════════════════════════════
   التهيئة
   ══════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  buildGrid();
  setStatus('idle');

  if (!getSDK()) {
    console.warn('[SDK] ⚠️ window.client.Conversation غير متاح بعد تحميل الصفحة — تأكد من تحميل الـ CDN');
  } else {
    console.log('[SDK] ✅ window.client.Conversation جاهز');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && state.started && !state.transferring) endConversation();

    // R = العودة لفهيم
    if (e.key === 'r' && state.started && !state.transferring && state.activeKey !== 'fahim') {
      returnToFahim();
    }

    // الأرقام 1-8 = القفز السريع للوكلاء
    const numKey = parseInt(e.key);
    if (numKey >= 1 && numKey <= 8 && state.started && !state.transferring) {
      const targetKey = ORDER[numKey - 1];
      if (targetKey && targetKey !== state.activeKey && hasId(targetKey)) {
        executeTransfer(targetKey);
      }
    }
  });

  console.log('[App] ✅ منظومة الوكلاء جاهزة |', ORDER.filter(hasId).length, 'وكيل متصل');
});
  </script>
